# 应用服务 WEB 访问端口
server:
  port: ${SERVER_PORT:8085}

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:feiniao}
    username: ${MYSQL_USERNAME:feiniao}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

alipay:
  app_id: ${ALIPAY_APP_ID}
  merchant_private_key: ${ALIPAY_MERCHANT_PRIVATE_KEY}
  alipay_public_key: ${ALIPAY_PUBLIC_KEY}
  return_url: ${ALIPAY_RETURN_URL:http://localhost:5173/orders}
  notify_url: ${ALIPAY_NOTIFY_URL}
  format: JSON
  sign_type: RSA2
  charset: utf-8
  gateway_url: https://openapi.alipay.com/gateway.do
  pay-timeout: 30
