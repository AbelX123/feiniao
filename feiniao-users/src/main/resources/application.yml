server:
  port: ${SERVER_PORT:8080}
spring:
  servlet:
    multipart:
      enabled: true
      max-file-size: 500MB
      max-request-size: 500MB
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:192.168.184.135}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:feiniao}
    username: ${MYSQL_USERNAME:feiniao}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      username: ${REDIS_USERNAME:default}
      password: ${REDIS_PASSWORD}
  jackson:
    default-property-inclusion: non_null
mybatis-plus:
  mapper-locations: classpath*:/mapper/*.xml
  type-aliases-package: com.ghml.feiniao.common.mapper
  configuration:
    auto-mapping-behavior: full
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  cdn-prefix: cdn
  avatar-expiry: 24
  case-expiry: 24
security:
  public-endpoints:
    - /api/users/signUp
    - /api/users/signIn
    - /api/users/signInByPhone
    - /api/users/refresh-token
    - /api/users/password
    - /api/users/creators/**
    - /api/captcha/create
    - /api/captcha/verify

aliyun:
  sms:
    endpoint: ${ALIYUN_SMS_ENDPOINT:dysmsapi.aliyuncs.com}
    access-key-id: ${ALIYUN_SMS_ACCESS_KEY_ID}
    access-key-secret: ${ALIYUN_SMS_ACCESS_KEY_SECRET}
    sign-name: ${ALIYUN_SMS_SIGN_NAME}
    template-code: ${ALIYUN_SMS_TEMPLATE_CODE}
    fallback-enabled: ${ALIYUN_SMS_FALLBACK_ENABLED:true}