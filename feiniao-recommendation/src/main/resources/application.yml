server:
  port: ${SERVER_PORT:8083}

spring:
  jackson:
    default-property-inclusion: non_null
  ai:
    # DeepSeek 使用 OpenAI 兼容协议
    openai:
      api-key: ${DEEPSEEK_API_KEY}
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat
    # MCP Client 配置，通过 SSE 连接 feiniao-mcp 服务
    mcp:
      client:
        name: feiniao-mcp-client
        enabled: true
        version: 1.0.0
        initialized: true
        type: async
        root-change-notification: true
        toolcallback:
          enabled: true
        sse:
          connections:
            feiniao-mcp-server:
              url: ${MCP_SERVER_URL:http://localhost:8084}
              sse-endpoint: /sse

logging:
  level:
    com.ghml.feiniao.recommendation: DEBUG
